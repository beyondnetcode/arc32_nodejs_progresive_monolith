version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ums-postgres
    restart: always
    environment:
      POSTGRES_USER: ums_user
      POSTGRES_PASSWORD: ums_password
      POSTGRES_DB: ums_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ums-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: ums-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ums.com
      PGADMIN_DEFAULT_PASSWORD: admin_password
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - ums-network

volumes:
  postgres_data:

networks:
  ums-network:
    driver: bridge
